spring:
  profiles:
    # 默认启用的 Dubbo 模式。
    # 示例: dubbo-local
    active: dubbo-local
  application:
    # 应用名称。
    # 示例: Medicine-Agent
    name: Medicine-Agent
    # 应用版本。
    # 示例: 1.0-beta
    version: 1.0-beta
  servlet:
    multipart:
      # 单个上传文件最大大小。
      # 示例: 50MB
      max-file-size: 50MB
      # 单次请求上传总大小上限。
      # 示例: 50MB
      max-request-size: 50MB
  data:
    redis:
      # Redis 主机地址。
      # 示例: localhost
      host: localhost
      # Redis 端口。
      # 示例: 6379
      port: 6379
      # Redis 数据库索引。
      # 示例: 0
      database: 0
      # Redis 密码。
      # 示例: 123456
      password: 123456

server:
  # Agent HTTP 服务端口。
  # 示例: 8083
  port: 8083

security:
  # 鉴权请求头名称。
  # 示例: Authorization
  header: Authorization
  # JWT 签名密钥。
  # 示例: 123456
  secret: 123456
  # Access Token 过期时间（秒，30分钟）。
  # 示例: 1800
  access-token-expire-time: 1800
  # Refresh Token 过期时间（秒，3天）。
  # 示例: 259200
  refresh-token-expire-time: 259200

system-auth:
  # 系统鉴权总开关。
  # 示例: true
  enabled: true
  # 时间戳容差（秒）。
  # 示例: 300
  max-skew-seconds: 300
  # nonce 存活时间（秒）。
  # 示例: 600
  nonce-ttl-seconds: 600
  # nonce Redis key 前缀。
  # 示例: system_auth:nonce
  nonce-key-prefix: system_auth:nonce
  # 客户端注册信息 JSON。
  # 示例: [{"app_id":"ai_server","secret":"123456","enabled":true}]
  clients-json: '[{"app_id":"ai_server","secret":"123456","enabled":true}]'
  # 默认签名版本。
  # 示例: v1
  default-sign-version: v1
  # 本方 app_id。
  # 示例: medicine-agent
  x-agent-key: medicine-agent
  # 本方签名密钥。
  # 示例: 123456
  local-secret: 123456

minio:
  # MinIO 服务地址。
  # 示例: http://localhost:9000
  endpoint: http://localhost:9000
  # MinIO Access Key。
  # 示例: 123456
  access-key: 123456
  # MinIO Secret Key。
  # 示例: 123456
  secret-key: 123456
  # 默认文件桶。
  # 示例: medicine
  bucket-name: medicine
  # 文件上传路径前缀。
  # 示例: resources
  upload-path: resources
  # 文件公网访问前缀。
  # 示例: http://localhost:9000/medicine/
  public-url-prefix: "http://localhost:9000/medicine/"

file:
  upload:
    # 允许上传的 MIME 类型或文件扩展名。
    # 示例: [image/jpeg, image/png, application/pdf, .docx]
    allowed-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - application/pdf
      - text/plain
      - .txt
      - .md
      - .pdf
      - .docx
      - .doc
      - .pptx
      - .ppt
      - .xlsx
      - .xls

logging:
  level:
    # 根日志级别。
    # 示例: INFO
    root: INFO

medicine:
  logging:
    # 日志根目录。
    # 示例: logs
    base-path: logs
    # 日志保留天数。
    # 示例: 30
    max-history-days: 30
