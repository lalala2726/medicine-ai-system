dubbo:
  application:
    # Dubbo 应用名。
    # 示例: medicine-admin-dubbo
    name: medicine-admin-dubbo
    # 序列化安全检查级别（STRICT/WARN/DISABLE）。
    # 示例: WARN
    serialize-check-status: WARN
    # QoS 管理端口（避免多服务本地启动端口冲突）。
    # 示例: 22222
    qos-port: 22222
  scan:
    # Dubbo 服务扫描包。
    # 示例: com.zhangyichuang.medicine
    base-packages: com.zhangyichuang.medicine
  protocol:
    # Dubbo 协议。
    # 示例: tri
    name: tri
    triple:
      # Triple HTTP/2 请求头总大小上限（字节），用于承载 Dubbo metadata/attachments。
      # 示例: 131072
      max-header-list-size: 131072
    # Admin Dubbo 暴露端口。
    # 示例: 20880
    port: 20880
  registry:
    # 本地直连模式关闭注册中心。
    # 示例: N/A
    address: "N/A"
  provider:
    # Provider 超时（毫秒）。
    # 示例: 30000
    timeout: 10000
    # Provider 重试次数。
    # 示例: 0
    retries: 0
